<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="contact_title">Свяжитесь с нами | Cyber Security PRO</title>
    <link rel="stylesheet" href="../../css/style.css">
    <script src="../../js/translations.js"></script>
    <style>
        .doc-page { max-width: 600px; margin: 60px auto; padding: 40px; }
        .doc-page h1 { color: var(--green); margin-bottom: 10px; font-size: 2rem; }
        .doc-page > p { color: var(--text-secondary); margin-bottom: 30px; font-size: 0.95rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: var(--text); margin-bottom: 6px; font-size: 0.9rem; font-weight: 600; }
        .form-group input, .form-group textarea { 
            width: 100%; padding: 12px; background: var(--bg-card); 
            border: 2px solid var(--border); border-radius: var(--radius-sm); 
            color: var(--text); font-size: 0.95rem; font-family: var(--font);
        }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--green); outline: none; }
        .form-group textarea { min-height: 140px; resize: vertical; }
        .btn-submit { 
            width: 100%; padding: 14px; background: var(--green); color: #000; 
            border: none; border-radius: var(--radius-sm); font-size: 1rem; 
            font-weight: 700; cursor: pointer; transition: all 0.2s;
        }
        .btn-submit:hover { background: var(--green-dark); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-success { display: none; text-align: center; padding: 40px; color: var(--green); font-size: 1.1rem; }
        .form-error { color: var(--red); font-size: 0.85rem; margin-top: 4px; display: none; }
        .back-link { display: inline-block; margin-top: 30px; color: var(--green); text-decoration: none; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }
        .honeypot { position: absolute; left: -9999px; opacity: 0; }
        .lang-switcher { position: fixed; top: 16px; right: 16px; z-index: 100; font-size: 0.8rem; }
        .lang-current { display: flex; align-items: center; gap: 8px; background: var(--bg-card); border: 1px solid var(--border); padding: 8px 14px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text); font-weight: 600; white-space: nowrap; transition: all 0.2s; user-select: none; }
        .lang-current:hover { border-color: var(--green); }
        .lang-current.open { border-color: var(--green); box-shadow: 0 0 12px var(--green-glow); }
        .lang-current span { font-size: 0.85rem; }
        .lang-arrow { transition: transform 0.2s; color: var(--text-secondary); }
        .lang-current.open .lang-arrow { transform: rotate(180deg); }
        .lang-dropdown { position: absolute; top: calc(100% + 4px); right: 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); min-width: 180px; max-height: 320px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5); animation: fadeIn 0.15s ease; scrollbar-width: thin; scrollbar-color: var(--green) transparent; }
        .lang-dropdown::-webkit-scrollbar { width: 4px; }
        .lang-dropdown::-webkit-scrollbar-track { background: transparent; border-radius: 2px; }
        .lang-dropdown::-webkit-scrollbar-thumb { background: var(--green); border-radius: 2px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        .lang-option { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; color: var(--text-secondary); font-size: 0.85rem; transition: all 0.15s; }
        .lang-option:hover { background: rgba(0, 224, 72, 0.05); color: var(--text); }
        .lang-option.active { color: var(--green); font-weight: 700; background: rgba(0, 224, 72, 0.08); }
    </style>
</head>
<body>

<div id="lang-switcher" class="lang-switcher"></div>

<div class="doc-page">
    <h1 data-i18n="contact_title">Свяжитесь с нами</h1>
    <p data-i18n="contact_desc">Есть вопросы, предложения или нужна помощь? Заполните форму — мы ответим в течение 24 часов.</p>
    
    <form id="contact-form" onsubmit="return submitForm(event)">
        <div class="form-group">
            <label data-i18n="contact_name">Имя</label>
            <input type="text" name="name" data-i18n-placeholder="contact_name_placeholder" placeholder="Ваше имя">
        </div>
        <div class="form-group">
            <label data-i18n="contact_email">Email *</label>
            <input type="email" name="email" required data-i18n-placeholder="contact_email_placeholder" placeholder="your@email.com">
            <div class="form-error" id="email-error" data-i18n="contact_email_error">Введите корректный email</div>
        </div>
        <div class="form-group">
            <label data-i18n="contact_subject">Тема</label>
            <input type="text" name="subject" data-i18n-placeholder="contact_subject_placeholder" placeholder="Тема сообщения">
        </div>
        <div class="form-group">
            <label data-i18n="contact_message">Сообщение *</label>
            <textarea name="message" required data-i18n-placeholder="contact_message_placeholder" placeholder="Опишите ваш вопрос..."></textarea>
        </div>
        <input type="text" name="honeypot" class="honeypot" tabindex="-1" autocomplete="off">
        <button type="submit" class="btn-submit" data-i18n="contact_send">Отправить сообщение</button>
    </form>
    
    <div class="form-success" id="form-success">
        <div style="font-size: 3rem; margin-bottom: 16px;">✅</div>
        <p data-i18n="contact_success">Сообщение отправлено! Мы ответим в течение 24 часов.</p>
    </div>
    
    <a href="../../" class="back-link" data-i18n="back_home">← На главную</a>
</div>

<script>
var I18n = {
    current: 'ru',
    languages: {
        ru: { name: 'Русский', flag: '🇷🇺' },
        en: { name: 'English', flag: '🇬🇧' },
        de: { name: 'Deutsch', flag: '🇩🇪' },
        fr: { name: 'Français', flag: '🇫🇷' },
        it: { name: 'Italiano', flag: '🇮🇹' },
        es: { name: 'Español', flag: '🇪🇸' },
        pt: { name: 'Português', flag: '🇧🇷' },
        zh: { name: '中文', flag: '🇨🇳' },
        ja: { name: '日本語', flag: '🇯🇵' },
        ko: { name: '한국어', flag: '🇰🇷' }
    },
    init: function() {
        var lang = this.getSavedLanguage() || this.getBrowserLanguage();
        if (!this.languages[lang]) lang = 'en';
        this.setLanguage(lang);
        this.renderSwitcher();
    },
    getSavedLanguage: function() { return localStorage.getItem('cs_lang'); },
    getBrowserLanguage: function() {
        var lang = navigator.language || navigator.userLanguage || 'en';
        return lang.split('-')[0];
    },
    setLanguage: function(lang) {
        this.current = lang;
        localStorage.setItem('cs_lang', lang);
        document.documentElement.lang = lang;
        document.querySelectorAll('[data-i18n]').forEach(function(el) {
            var key = el.getAttribute('data-i18n');
            if (ContactTranslations[lang] && ContactTranslations[lang][key]) {
                el.textContent = ContactTranslations[lang][key];
            }
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
            var key = el.getAttribute('data-i18n-placeholder');
            if (ContactTranslations[lang] && ContactTranslations[lang][key]) {
                el.placeholder = ContactTranslations[lang][key];
            }
        });
        document.querySelectorAll('.lang-option').forEach(function(opt) {
            opt.classList.toggle('active', opt.getAttribute('data-lang') === lang);
        });
        var currentBtn = document.querySelector('.lang-current span');
        if (currentBtn && this.languages[lang]) {
            currentBtn.textContent = this.languages[lang].flag + ' ' + this.languages[lang].name;
        }
    },
    renderSwitcher: function() {
        var container = document.getElementById('lang-switcher');
        if (!container) return;
        var current = this.languages[this.current] || this.languages['en'];
        var html = '<div class="lang-current" onclick="I18n.toggleSwitcher()"><span>' + current.flag + ' ' + current.name + '</span><svg class="lang-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div><div class="lang-dropdown" id="lang-dropdown" style="display:none;">';
        for (var code in this.languages) {
            var lang = this.languages[code];
            var active = code === this.current ? ' active' : '';
            html += '<div class="lang-option' + active + '" data-lang="' + code + '" onclick="I18n.setLanguage(\'' + code + '\')"><span>' + lang.flag + ' ' + lang.name + '</span></div>';
        }
        html += '</div>';
        container.innerHTML = html;
    },
    toggleSwitcher: function() {
        var dropdown = document.getElementById('lang-dropdown');
        var btn = document.querySelector('.lang-current');
        if (dropdown) {
            var isOpen = dropdown.style.display === 'block';
            dropdown.style.display = isOpen ? 'none' : 'block';
            if (btn) btn.classList.toggle('open', !isOpen);
        }
    },
    closeDropdown: function() {
        var dropdown = document.getElementById('lang-dropdown');
        var btn = document.querySelector('.lang-current');
        if (dropdown) dropdown.style.display = 'none';
        if (btn) btn.classList.remove('open');
    }
};

document.addEventListener('click', function(e) {
    if (!e.target.closest('#lang-switcher')) I18n.closeDropdown();
});

var ContactTranslations = {
    ru: {
        contact_title: 'Свяжитесь с нами | Cyber Security PRO',
        contact_desc: 'Есть вопросы, предложения или нужна помощь? Заполните форму — мы ответим в течение 24 часов.',
        contact_name: 'Имя',
        contact_name_placeholder: 'Ваше имя',
        contact_email: 'Email *',
        contact_email_placeholder: 'your@email.com',
        contact_email_error: 'Введите корректный email',
        contact_subject: 'Тема',
        contact_subject_placeholder: 'Тема сообщения',
        contact_message: 'Сообщение *',
        contact_message_placeholder: 'Опишите ваш вопрос...',
        contact_send: 'Отправить сообщение',
        contact_success: 'Сообщение отправлено! Мы ответим в течение 24 часов.',
        back_home: '← На главную'
    },
    en: {
        contact_title: 'Contact Us | Cyber Security PRO',
        contact_desc: 'Have questions, suggestions, or need help? Fill out the form — we\'ll respond within 24 hours.',
        contact_name: 'Name',
        contact_name_placeholder: 'Your name',
        contact_email: 'Email *',
        contact_email_placeholder: 'your@email.com',
        contact_email_error: 'Enter a valid email',
        contact_subject: 'Subject',
        contact_subject_placeholder: 'Message subject',
        contact_message: 'Message *',
        contact_message_placeholder: 'Describe your question...',
        contact_send: 'Send Message',
        contact_success: 'Message sent! We\'ll respond within 24 hours.',
        back_home: '← Back to Home'
    }
};

for (var lang in ContactTranslations) {
    if (lang === 'en') continue;
    for (var key in ContactTranslations.en) {
        if (!ContactTranslations[lang][key]) {
            ContactTranslations[lang][key] = ContactTranslations.en[key];
        }
    }
}

async function submitForm(e) {
    e.preventDefault();
    var form = document.getElementById('contact-form');
    var success = document.getElementById('form-success');
    var emailError = document.getElementById('email-error');
    var btn = form.querySelector('.btn-submit');
    
    var email = form.email.value.trim();
    if (!email.includes('@') || !email.includes('.')) {
        emailError.style.display = 'block';
        return false;
    }
    emailError.style.display = 'none';
    
    var data = {
        name: form.name.value.trim(),
        email: email,
        subject: form.subject.value.trim(),
        message: form.message.value.trim(),
        honeypot: form.honeypot.value
    };
    
    btn.textContent = '⏳ ' + (I18n.current === 'ru' ? 'Отправка...' : 'Sending...');
    btn.disabled = true;
    
    try {
        var resp = await fetch('../../api/send-message.php', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if (resp.ok) {
            form.style.display = 'none';
            success.style.display = 'block';
        } else {
            alert('Ошибка отправки. Попробуйте позже.');
        }
    } catch (err) {
        alert('Ошибка соединения. Попробуйте позже.');
    }
    
    btn.textContent = ContactTranslations[I18n.current].contact_send || 'Send Message';
    btn.disabled = false;
    return false;
}

document.addEventListener('DOMContentLoaded', function() { I18n.init(); });
</script>
</body>
</html>
